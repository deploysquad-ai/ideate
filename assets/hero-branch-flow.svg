<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380">
  <defs>
    <!-- Glow filters -->
    <filter id="amber-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Arrowhead -->
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="380" rx="12" fill="#1a1d2e"/>

  <!-- ═══════════════ MAIN THREAD (horizontal spine) ═══════════════ -->
  <!-- Main thread line -->
  <line x1="80" y1="200" x2="720" y2="200" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Main thread label -->
  <text x="80" y="240" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="rgba(255,255,255,0.35)" letter-spacing="1.5">MAIN</text>

  <!-- ═══════════════ NODE 1: Root ═══════════════ -->
  <circle cx="120" cy="200" r="16" fill="#f5a623" opacity="0.12"/>
  <circle cx="120" cy="200" r="8" fill="#f5a623" opacity="0.9" filter="url(#soft-glow)"/>
  <text x="120" y="270" font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="11" fill="rgba(255,255,255,0.6)" text-anchor="middle">start session</text>

  <!-- ═══════════════ BRANCH 1: pricing-model (upward) ═══════════════ -->
  <!-- Fork line from main -->
  <path d="M 180,200 C 200,200 210,160 230,120" fill="none" stroke="#6a7cc5" stroke-width="2" opacity="0.8"/>

  <!-- Branch line -->
  <line x1="230" y1="120" x2="400" y2="120" stroke="#6a7cc5" stroke-width="2" opacity="0.6"/>

  <!-- Branch label -->
  <text x="315" y="100" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#6a7cc5" text-anchor="middle" opacity="0.9">pricing-model</text>

  <!-- Commit nodes on branch -->
  <circle cx="270" cy="120" r="4" fill="#6a7cc5" opacity="0.7"/>
  <text x="270" y="82" font-family="'Inter', sans-serif" font-size="9" fill="rgba(255,255,255,0.35)" text-anchor="middle">freemium vs</text>
  <text x="270" y="92" font-family="'Inter', sans-serif" font-size="9" fill="rgba(255,255,255,0.35)" text-anchor="middle">flat-rate</text>

  <circle cx="330" cy="120" r="4" fill="#6a7cc5" opacity="0.7"/>
  <text x="330" y="82" font-family="'Inter', sans-serif" font-size="9" fill="rgba(255,255,255,0.35)" text-anchor="middle">usage-based</text>
  <text x="330" y="92" font-family="'Inter', sans-serif" font-size="9" fill="rgba(255,255,255,0.35)" text-anchor="middle">hybrid</text>

  <!-- Conclusion node (glowing) -->
  <circle cx="390" cy="120" r="12" fill="#f5a623" opacity="0.15"/>
  <circle cx="390" cy="120" r="6" fill="#f5a623" opacity="0.9" filter="url(#soft-glow)"/>

  <!-- Merge line back to main -->
  <path d="M 390,120 C 400,150 410,180 420,200" fill="none" stroke="#f5a623" stroke-width="2" opacity="0.7"/>

  <!-- ═══════════════ NODE 2: Merge point on main ═══════════════ -->
  <circle cx="420" cy="200" r="14" fill="#f5a623" opacity="0.12"/>
  <circle cx="420" cy="200" r="7" fill="#f5a623" opacity="0.85" filter="url(#soft-glow)"/>

  <!-- Extracted artifacts label -->
  <rect x="368" y="250" width="106" height="20" rx="4" fill="#f5a623" opacity="0.12"/>
  <text x="421" y="263" font-family="'Inter', sans-serif" font-size="9" fill="#f5a623" text-anchor="middle" opacity="0.9">Decision + Feature</text>

  <!-- ═══════════════ BRANCH 2: auth-approach (downward) ═══════════════ -->
  <!-- Fork line from main -->
  <path d="M 470,200 C 490,200 500,240 520,280" fill="none" stroke="#d97757" stroke-width="2" opacity="0.8"/>

  <!-- Branch line -->
  <line x1="520" y1="280" x2="630" y2="280" stroke="#d97757" stroke-width="2" opacity="0.6"/>

  <!-- Branch label -->
  <text x="575" y="310" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#d97757" text-anchor="middle" opacity="0.9">auth-approach</text>

  <!-- Commit nodes -->
  <circle cx="560" cy="280" r="4" fill="#d97757" opacity="0.7"/>
  <text x="560" y="338" font-family="'Inter', sans-serif" font-size="9" fill="rgba(255,255,255,0.35)" text-anchor="middle">OAuth vs</text>
  <text x="560" y="348" font-family="'Inter', sans-serif" font-size="9" fill="rgba(255,255,255,0.35)" text-anchor="middle">email/pass</text>

  <!-- Conclusion node -->
  <circle cx="620" cy="280" r="12" fill="#f5a623" opacity="0.15"/>
  <circle cx="620" cy="280" r="6" fill="#f5a623" opacity="0.9" filter="url(#soft-glow)"/>

  <!-- Merge line back to main -->
  <path d="M 620,280 C 635,260 645,230 660,200" fill="none" stroke="#f5a623" stroke-width="2" opacity="0.7"/>

  <!-- ═══════════════ NODE 3: Second merge point ═══════════════ -->
  <circle cx="660" cy="200" r="14" fill="#f5a623" opacity="0.12"/>
  <circle cx="660" cy="200" r="7" fill="#f5a623" opacity="0.85" filter="url(#soft-glow)"/>

  <!-- Extracted artifact label -->
  <rect x="622" y="250" width="76" height="20" rx="4" fill="#f5a623" opacity="0.12"/>
  <text x="660" y="263" font-family="'Inter', sans-serif" font-size="9" fill="#f5a623" text-anchor="middle" opacity="0.9">Decision</text>

  <!-- ═══════════════ ENDPOINT: Document ═══════════════ -->
  <!-- Document icon -->
  <rect x="710" y="184" width="24" height="32" rx="2" fill="none" stroke="#f5a623" stroke-width="1.5" opacity="0.8"/>
  <path d="M 710,184 L 724,184 L 734,194 L 734,216" fill="none" stroke="#f5a623" stroke-width="1.5" opacity="0.8"/>
  <line x1="716" y1="196" x2="728" y2="196" stroke="#f5a623" stroke-width="1" opacity="0.4"/>
  <line x1="716" y1="201" x2="728" y2="201" stroke="#f5a623" stroke-width="1" opacity="0.4"/>
  <line x1="716" y1="206" x2="724" y2="206" stroke="#f5a623" stroke-width="1" opacity="0.4"/>

  <text x="722" y="240" font-family="'SF Mono', 'Fira Code', monospace" font-size="10" fill="#f5a623" text-anchor="middle" opacity="0.7">/ideate.doc</text>

  <!-- ═══════════════ LEGEND ═══════════════ -->
  <circle cx="90" cy="350" r="4" fill="#6a7cc5" opacity="0.7"/>
  <text x="100" y="354" font-family="'Inter', sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">exploring</text>

  <circle cx="170" cy="350" r="4" fill="#f5a623" opacity="0.9"/>
  <text x="180" y="354" font-family="'Inter', sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">concluded</text>

  <circle cx="260" cy="350" r="4" fill="#d97757" opacity="0.7"/>
  <text x="270" y="354" font-family="'Inter', sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">active branch</text>
</svg>