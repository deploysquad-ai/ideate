<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ideate — Brand Visuals</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
            --ideate-amber: #f5a623;
            --ideate-slate: #1a1d2e;
            --ideate-periwinkle: #6a7cc5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 300px;
            flex-shrink: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20,20,19,0.1);
            overflow-y: auto;
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 22px;
            font-weight: 500;
            color: var(--ideate-slate);
            margin-bottom: 4px;
        }

        .wordmark-preview {
            font-family: 'Inter', sans-serif;
            font-size: 28px;
            font-weight: 300;
            letter-spacing: -0.02em;
            color: var(--ideate-slate);
            margin: 12px 0 4px;
        }

        .wordmark-preview span {
            color: var(--ideate-amber);
        }

        .tagline {
            font-size: 11px;
            color: var(--anthropic-mid-gray);
            font-style: italic;
            margin-bottom: 24px;
            line-height: 1.4;
        }

        .control-section {
            margin-bottom: 28px;
        }

        .control-section h3 {
            font-size: 13px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '•';
            color: var(--ideate-amber);
            font-weight: bold;
        }

        .control-group {
            margin-bottom: 16px;
        }

        .control-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 6px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--ideate-amber);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: var(--anthropic-mid-gray);
            min-width: 40px;
            text-align: right;
        }

        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 10px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            margin-bottom: 10px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--ideate-amber);
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 6px;
        }

        .button {
            background: var(--ideate-amber);
            color: white;
            border: none;
            padding: 9px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            font-family: 'Poppins', sans-serif;
        }

        .button:hover {
            opacity: 0.88;
            transform: translateY(-1px);
        }

        .button.secondary {
            background: var(--ideate-periwinkle);
        }

        .button.dark {
            background: var(--ideate-slate);
        }

        .button-row {
            display: flex;
            gap: 6px;
        }

        .button-row .button { flex: 1; }

        .mode-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
        }

        .mode-tab {
            flex: 1;
            padding: 8px;
            border: 1.5px solid var(--anthropic-light-gray);
            border-radius: 6px;
            background: white;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            color: var(--anthropic-mid-gray);
            font-family: 'Poppins', sans-serif;
        }

        .mode-tab.active {
            border-color: var(--ideate-amber);
            color: var(--ideate-amber);
            background: rgba(245,166,35,0.06);
        }

        .canvas-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        #canvas-container {
            width: 100%;
            max-width: 800px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(20,20,19,0.12);
            background: white;
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        .canvas-caption {
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            text-align: center;
        }

        .color-group { margin-bottom: 12px; }

        .color-group label {
            display: block;
            font-size: 11px;
            color: var(--anthropic-mid-gray);
            margin-bottom: 4px;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-picker-container input[type="color"] {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: var(--anthropic-mid-gray);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <h1>Ideate</h1>
        <div class="wordmark-preview">idea<span>te</span></div>
        <div class="tagline">Ramble freely. Ship a structured brief.</div>

        <!-- Mode Selection -->
        <div class="mode-tabs">
            <div class="mode-tab active" id="tab-tree" onclick="setMode('tree')">Thought Tree</div>
            <div class="mode-tab" id="tab-logo" onclick="setMode('logo')">Logo Mark</div>
            <div class="mode-tab" id="tab-hero" onclick="setMode('hero')">Hero BG</div>
        </div>

        <!-- Seed -->
        <div class="control-section">
            <h3>Seed</h3>
            <input type="number" id="seed-input" class="seed-input" value="42" onchange="updateSeed()">
            <div class="seed-controls">
                <button class="button secondary" onclick="previousSeed()">← Prev</button>
                <button class="button secondary" onclick="nextSeed()">Next →</button>
            </div>
            <button class="button dark" onclick="randomSeedAndUpdate()">↻ Random</button>
        </div>

        <!-- Parameters -->
        <div class="control-section">
            <h3>Parameters</h3>

            <div class="control-group">
                <label>Branch Depth</label>
                <div class="slider-container">
                    <input type="range" id="maxDepth" min="3" max="9" step="1" value="6" oninput="updateParam('maxDepth', parseInt(this.value))">
                    <span class="value-display" id="maxDepth-value">6</span>
                </div>
            </div>

            <div class="control-group">
                <label>Branch Spread</label>
                <div class="slider-container">
                    <input type="range" id="spread" min="0.2" max="1.2" step="0.05" value="0.65" oninput="updateParam('spread', parseFloat(this.value))">
                    <span class="value-display" id="spread-value">0.65</span>
                </div>
            </div>

            <div class="control-group">
                <label>Organic Noise</label>
                <div class="slider-container">
                    <input type="range" id="noiseMag" min="0.0" max="0.5" step="0.02" value="0.18" oninput="updateParam('noiseMag', parseFloat(this.value))">
                    <span class="value-display" id="noiseMag-value">0.18</span>
                </div>
            </div>

            <div class="control-group">
                <label>Merge Probability</label>
                <div class="slider-container">
                    <input type="range" id="mergePct" min="0" max="0.5" step="0.05" value="0.2" oninput="updateParam('mergePct', parseFloat(this.value))">
                    <span class="value-display" id="mergePct-value">0.2</span>
                </div>
            </div>

            <div class="control-group">
                <label>Glow Intensity</label>
                <div class="slider-container">
                    <input type="range" id="glowIntensity" min="0" max="1" step="0.05" value="0.6" oninput="updateParam('glowIntensity', parseFloat(this.value))">
                    <span class="value-display" id="glowIntensity-value">0.6</span>
                </div>
            </div>
        </div>

        <!-- Colors -->
        <div class="control-section">
            <h3>Colors</h3>
            <div class="color-group">
                <label>Background</label>
                <div class="color-picker-container">
                    <input type="color" id="bgColor" value="#1a1d2e" onchange="updateColor('bgColor', this.value)">
                    <span class="color-value" id="bgColor-value">#1a1d2e</span>
                </div>
            </div>
            <div class="color-group">
                <label>Branch (cool)</label>
                <div class="color-picker-container">
                    <input type="color" id="coolColor" value="#6a7cc5" onchange="updateColor('coolColor', this.value)">
                    <span class="color-value" id="coolColor-value">#6a7cc5</span>
                </div>
            </div>
            <div class="color-group">
                <label>Branch (warm)</label>
                <div class="color-picker-container">
                    <input type="color" id="warmColor" value="#d97757" onchange="updateColor('warmColor', this.value)">
                    <span class="color-value" id="warmColor-value">#d97757</span>
                </div>
            </div>
            <div class="color-group">
                <label>Conclusion glow</label>
                <div class="color-picker-container">
                    <input type="color" id="glowColor" value="#f5a623" onchange="updateColor('glowColor', this.value)">
                    <span class="color-value" id="glowColor-value">#f5a623</span>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="control-section">
            <h3>Actions</h3>
            <div class="button-row" style="margin-bottom:6px;">
                <button class="button" onclick="resetParameters()">Reset</button>
                <button class="button secondary" onclick="downloadPNG()">↓ PNG</button>
            </div>
        </div>
    </div>

    <div class="canvas-area">
        <div id="canvas-container"></div>
        <div class="canvas-caption" id="canvas-caption">Thought Tree — seed 42 · cognitive branching generative art</div>
    </div>
</div>

<script>
// ─────────────────────────────────────────────
// PARAMETERS
// ─────────────────────────────────────────────

let params = {
    seed: 42,
    maxDepth: 6,
    spread: 0.65,
    noiseMag: 0.18,
    mergePct: 0.2,
    glowIntensity: 0.6,
    bgColor: '#1a1d2e',
    coolColor: '#6a7cc5',
    warmColor: '#d97757',
    glowColor: '#f5a623',
};
let defaultParams = {...params};
let currentMode = 'tree';
let p5Instance = null;

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────

function hexToRgb(hex) {
    let r = parseInt(hex.slice(1,3),16);
    let g = parseInt(hex.slice(3,5),16);
    let b = parseInt(hex.slice(5,7),16);
    return {r, g, b};
}

function lerpColor3(c1, c2, t) {
    return {
        r: c1.r + (c2.r - c1.r)*t,
        g: c1.g + (c2.g - c1.g)*t,
        b: c1.b + (c2.b - c1.b)*t,
    };
}

// ─────────────────────────────────────────────
// MODE: THOUGHT TREE
// ─────────────────────────────────────────────

function buildSketchTree(s) {
    let branches = [];

    function spawnBranches(x, y, angle, length, depth, heat, parentId) {
        if (depth <= 0 || length < 3) return;

        const noiseOff = s.noise(x * 0.01, y * 0.01, params.seed * 0.001);
        const angleWobble = (noiseOff - 0.5) * params.noiseMag * Math.PI;
        const a = angle + angleWobble;

        const x2 = x + Math.cos(a) * length;
        const y2 = y - Math.sin(a) * length;

        const newHeat = heat + s.random(-0.1, 0.15);
        const clampedHeat = Math.max(0, Math.min(1, newHeat));

        const isConclusion = depth === 1 || s.random() < (params.mergePct * (1 - depth / params.maxDepth));

        branches.push({ x1: x, y1: y, x2, y2, depth, heat: clampedHeat, isConclusion, id: branches.length, parentId });

        if (!isConclusion) {
            const numChildren = depth > 2 ? (s.random() < 0.3 ? 3 : 2) : 1;
            const baseSpread = params.spread;
            for (let i = 0; i < numChildren; i++) {
                const spreadAngle = numChildren === 1 ? 0 :
                    (i - (numChildren - 1) / 2) * baseSpread * (1 + (params.maxDepth - depth) * 0.1);
                spawnBranches(
                    x2, y2,
                    a + spreadAngle,
                    length * (0.62 + s.random(-0.08, 0.08)),
                    depth - 1,
                    clampedHeat,
                    branches.length - 1
                );
            }
        }
    }

    s.setup = function() {
        let canvas = s.createCanvas(900, 900);
        canvas.parent('canvas-container');
        document.querySelector('.loading') && (document.querySelector('.loading').style.display = 'none');
        drawTree();
    };

    function drawTree() {
        branches = [];
        s.randomSeed(params.seed);
        s.noiseSeed(params.seed);

        const bg = hexToRgb(params.bgColor);
        s.background(bg.r, bg.g, bg.b);

        // Subtle grid lines suggesting structure
        s.stroke(255, 255, 255, 8);
        s.strokeWeight(0.5);
        for (let i = 0; i < s.width; i += 60) {
            s.line(i, 0, i, s.height);
        }
        for (let j = 0; j < s.height; j += 60) {
            s.line(0, j, s.width, j);
        }

        spawnBranches(s.width / 2, s.height - 80, Math.PI / 2, s.height * 0.28, params.maxDepth, 0.0, -1);

        const cool = hexToRgb(params.coolColor);
        const warm = hexToRgb(params.warmColor);
        const glow = hexToRgb(params.glowColor);

        // Draw branches back to front (deepest first)
        branches.sort((a, b) => b.depth - a.depth);

        for (let br of branches) {
            const depthRatio = 1 - br.depth / params.maxDepth;
            const baseColor = lerpColor3(cool, warm, br.heat);
            const strokeW = Math.max(0.5, 3 * (br.depth / params.maxDepth) - 0.5);
            const alpha = 120 + depthRatio * 135;

            if (br.isConclusion) {
                // Draw glow halo
                const glow2 = hexToRgb(params.glowColor);
                const gi = params.glowIntensity;
                s.noStroke();
                for (let r2 = 18; r2 > 0; r2--) {
                    s.fill(glow2.r, glow2.g, glow2.b, gi * 6 * (r2 / 18));
                    s.circle(br.x2, br.y2, r2 * 2.2);
                }
                s.stroke(glow2.r, glow2.g, glow2.b, 200 * gi + 55);
                s.strokeWeight(strokeW * 1.5);
                s.line(br.x1, br.y1, br.x2, br.y2);
                s.noStroke();
                s.fill(glow2.r, glow2.g, glow2.b, 230);
                s.circle(br.x2, br.y2, 5 + strokeW * 2);
            } else {
                s.stroke(baseColor.r, baseColor.g, baseColor.b, alpha);
                s.strokeWeight(strokeW);
                s.noFill();
                s.line(br.x1, br.y1, br.x2, br.y2);

                // Node dot
                s.noStroke();
                s.fill(baseColor.r, baseColor.g, baseColor.b, alpha * 0.9);
                s.circle(br.x2, br.y2, strokeW * 2.5);
            }
        }

        // Root node
        const glowRgb = hexToRgb(params.glowColor);
        s.noStroke();
        for (let r2 = 24; r2 > 0; r2--) {
            s.fill(glowRgb.r, glowRgb.g, glowRgb.b, params.glowIntensity * 8 * (r2 / 24));
            s.circle(s.width / 2, s.height - 80, r2 * 2.4);
        }
        s.fill(glowRgb.r, glowRgb.g, glowRgb.b, 240);
        s.circle(s.width / 2, s.height - 80, 14);

        // Wordmark at bottom
        s.noStroke();
        s.fill(255, 255, 255, 30);
        s.textFont('sans-serif');
        s.textSize(13);
        s.textAlign(s.CENTER);
        s.text('ideate', s.width / 2, s.height - 22);
    }

    s.draw = function() {};
    s._drawTree = drawTree;
}

// ─────────────────────────────────────────────
// MODE: LOGO MARK
// ─────────────────────────────────────────────

function buildSketchLogo(s) {
    s.setup = function() {
        let canvas = s.createCanvas(900, 600);
        canvas.parent('canvas-container');
        drawLogo();
    };

    function drawLogo() {
        s.randomSeed(params.seed);
        s.noiseSeed(params.seed);

        const bg = hexToRgb(params.bgColor);
        const cool = hexToRgb(params.coolColor);
        const warm = hexToRgb(params.warmColor);
        const glow = hexToRgb(params.glowColor);

        s.background(bg.r, bg.g, bg.b);

        const cx = s.width / 2 - 80;
        const cy = s.height / 2;
        const rootR = 10;
        const len = 90;

        // Draw icon mark: root → 3 branches → conclusion nodes
        const branches3 = [
            { dx: -1.1, dy: -1.0, label: 'branch', conclude: false },
            { dx: 0.0,  dy: -1.3, label: 'main',   conclude: true  },
            { dx: 1.1,  dy: -0.9, label: 'branch',  conclude: false },
        ];

        // sub branches from left and right
        const subbranches = [
            { from: 0, dx: -0.6, dy: -1.1, conclude: false },
            { from: 0, dx: -1.2, dy: -0.7, conclude: true },
            { from: 2, dx:  0.8, dy: -1.0, conclude: true  },
            { from: 2, dx:  1.3, dy: -0.5, conclude: false },
        ];

        // Draw connecting lines first
        s.strokeWeight(2.5);
        s.noFill();

        for (let i = 0; i < branches3.length; i++) {
            const b = branches3[i];
            const bx = cx + b.dx * len * 0.75;
            const by = cy + b.dy * len * 0.75;
            const c = lerpColor3(cool, warm, (i / 2));
            const alpha = b.conclude ? 220 : 170;
            s.stroke(c.r, c.g, c.b, alpha);
            s.line(cx, cy, bx, by);
        }

        for (let sb of subbranches) {
            const pb = branches3[sb.from];
            const px = cx + pb.dx * len * 0.75;
            const py = cy + pb.dy * len * 0.75;
            const nx = px + sb.dx * len * 0.55;
            const ny = py + sb.dy * len * 0.55;
            const c = lerpColor3(cool, warm, sb.from / 2);
            s.stroke(c.r, c.g, c.b, sb.conclude ? 200 : 130);
            s.strokeWeight(1.5);
            s.line(px, py, nx, ny);

            if (sb.conclude) {
                s.noStroke();
                for (let r2 = 14; r2 > 0; r2--) {
                    s.fill(glow.r, glow.g, glow.b, params.glowIntensity * 8 * (r2/14));
                    s.circle(nx, ny, r2 * 2);
                }
                s.fill(glow.r, glow.g, glow.b, 230);
                s.circle(nx, ny, 9);
            } else {
                s.noStroke();
                s.fill(c.r, c.g, c.b, 130);
                s.circle(nx, ny, 7);
            }
        }

        // Branch nodes
        for (let i = 0; i < branches3.length; i++) {
            const b = branches3[i];
            const bx = cx + b.dx * len * 0.75;
            const by = cy + b.dy * len * 0.75;
            const c = lerpColor3(cool, warm, i / 2);

            s.noStroke();
            if (b.conclude) {
                for (let r2 = 18; r2 > 0; r2--) {
                    s.fill(glow.r, glow.g, glow.b, params.glowIntensity * 9 * (r2/18));
                    s.circle(bx, by, r2 * 2.2);
                }
                s.fill(glow.r, glow.g, glow.b, 245);
                s.circle(bx, by, 11);
            } else {
                s.fill(c.r, c.g, c.b, 200);
                s.circle(bx, by, 9);
            }
        }

        // Root glow
        for (let r2 = 20; r2 > 0; r2--) {
            s.fill(glow.r, glow.g, glow.b, params.glowIntensity * 7 * (r2/20));
            s.circle(cx, cy, r2 * 2.2);
        }
        s.fill(glow.r, glow.g, glow.b, 255);
        s.circle(cx, cy, rootR * 2);

        // Wordmark to the right
        const tx = cx + 52;
        const ty = cy;

        s.noStroke();
        s.textFont('sans-serif');
        s.textStyle(s.NORMAL);

        // "idea" in white
        s.fill(255, 255, 255, 230);
        s.textSize(52);
        s.textAlign(s.LEFT, s.CENTER);
        s.text('idea', tx, ty);

        // "te" in amber
        const ideaW = s.textWidth('idea');
        s.fill(glow.r, glow.g, glow.b, 240);
        s.text('te', tx + ideaW, ty);

        // Tagline
        s.fill(255, 255, 255, 70);
        s.textSize(14);
        s.text('Ramble freely. Ship a structured brief.', tx, ty + 40);
    }

    s.draw = function() {};
    s._drawLogo = drawLogo;
}

// ─────────────────────────────────────────────
// MODE: HERO BACKGROUND
// ─────────────────────────────────────────────

function buildSketchHero(s) {
    let t = 0;

    function spawnNodeField() {
        s.randomSeed(params.seed);
        s.noiseSeed(params.seed);

        const bg = hexToRgb(params.bgColor);
        const cool = hexToRgb(params.coolColor);
        const warm = hexToRgb(params.warmColor);
        const glow = hexToRgb(params.glowColor);

        s.background(bg.r, bg.g, bg.b);

        // Scattered mini-branch clusters across canvas — abstracted thought constellation
        const clusterCount = 12 + Math.floor(s.random(5));

        for (let c = 0; c < clusterCount; c++) {
            const cx2 = s.random(80, s.width - 80);
            const cy2 = s.random(80, s.height - 80);
            const depth = 2 + Math.floor(s.random(3));
            const baseLen = 30 + s.random(50);
            const heat = s.random();

            drawMiniCluster(cx2, cy2, Math.PI / 2 + s.random(-0.6, 0.6), baseLen, depth, heat, cool, warm, glow);
        }

        // Very subtle grid
        s.stroke(255, 255, 255, 5);
        s.strokeWeight(0.4);
        for (let i = 0; i < s.width; i += 80) s.line(i, 0, i, s.height);
        for (let j = 0; j < s.height; j += 80) s.line(0, j, s.width, j);
    }

    function drawMiniCluster(x, y, angle, len, depth, heat, cool, warm, glow) {
        if (depth <= 0 || len < 4) return;
        const noiseV = s.noise(x * 0.008, y * 0.008, params.seed * 0.002);
        const a = angle + (noiseV - 0.5) * params.noiseMag * Math.PI;
        const x2 = x + Math.cos(a) * len;
        const y2 = y - Math.sin(a) * len;
        const c = lerpColor3(cool, warm, heat);
        const alpha = 40 + depth * 22;
        const sw = Math.max(0.4, depth * 0.8);
        s.stroke(c.r, c.g, c.b, alpha);
        s.strokeWeight(sw);
        s.noFill();
        s.line(x, y, x2, y2);

        const isLeaf = depth === 1 || s.random() < params.mergePct;
        if (isLeaf) {
            const gi = params.glowIntensity;
            s.noStroke();
            for (let r2 = 10; r2 > 0; r2--) {
                s.fill(glow.r, glow.g, glow.b, gi * 5 * (r2/10));
                s.circle(x2, y2, r2 * 1.6);
            }
            s.fill(glow.r, glow.g, glow.b, 160 * gi + 40);
            s.circle(x2, y2, 4);
        } else {
            s.noStroke();
            s.fill(c.r, c.g, c.b, alpha * 0.7);
            s.circle(x2, y2, sw * 2);

            const nkids = s.random() < 0.4 ? 3 : 2;
            for (let k = 0; k < nkids; k++) {
                const spread = (k - (nkids - 1) / 2) * params.spread * 0.8;
                drawMiniCluster(x2, y2, a + spread, len * 0.65, depth - 1, s.random(), cool, warm, glow);
            }
        }
    }

    s.setup = function() {
        let canvas = s.createCanvas(900, 480);
        canvas.parent('canvas-container');
        spawnNodeField();
        s.noLoop();
    };

    s.draw = function() {};
    s._redraw = spawnNodeField;
}

// ─────────────────────────────────────────────
// MODE SWITCHER
// ─────────────────────────────────────────────

function setMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('tab-' + mode).classList.add('active');
    rebuildSketch();

    const captions = {
        tree: `Thought Tree — seed ${params.seed} · cognitive branching generative art`,
        logo: `Logo Mark — wordmark + icon · seed ${params.seed}`,
        hero: `Hero Background — scattered thought constellation · seed ${params.seed}`,
    };
    document.getElementById('canvas-caption').textContent = captions[mode];
}

function rebuildSketch() {
    if (p5Instance) {
        p5Instance.remove();
        p5Instance = null;
    }
    document.getElementById('canvas-container').innerHTML = '';

    if (currentMode === 'tree') {
        p5Instance = new p5(buildSketchTree);
    } else if (currentMode === 'logo') {
        p5Instance = new p5(buildSketchLogo);
    } else {
        p5Instance = new p5(buildSketchHero);
    }

    document.getElementById('canvas-caption').textContent =
        `${currentMode === 'tree' ? 'Thought Tree' : currentMode === 'logo' ? 'Logo Mark' : 'Hero Background'} — seed ${params.seed}`;
}

// ─────────────────────────────────────────────
// UI HANDLERS
// ─────────────────────────────────────────────

function updateParam(name, val) {
    params[name] = val;
    document.getElementById(name + '-value').textContent =
        typeof val === 'number' ? (Number.isInteger(val) ? val : val.toFixed(2)) : val;
    redrawCurrent();
}

function updateColor(id, val) {
    params[id] = val;
    document.getElementById(id + '-value').textContent = val;
    redrawCurrent();
}

function redrawCurrent() {
    if (!p5Instance) return;
    if (currentMode === 'tree' && p5Instance._drawTree) p5Instance._drawTree();
    else if (currentMode === 'logo' && p5Instance._drawLogo) p5Instance._drawLogo();
    else if (currentMode === 'hero' && p5Instance._redraw) p5Instance._redraw();
}

function updateSeedDisplay() {
    document.getElementById('seed-input').value = params.seed;
}

function updateSeed() {
    const v = parseInt(document.getElementById('seed-input').value);
    if (v && v > 0) { params.seed = v; rebuildSketch(); } else { updateSeedDisplay(); }
}

function previousSeed() { params.seed = Math.max(1, params.seed - 1); updateSeedDisplay(); rebuildSketch(); }
function nextSeed() { params.seed++; updateSeedDisplay(); rebuildSketch(); }
function randomSeedAndUpdate() { params.seed = Math.floor(Math.random() * 99999) + 1; updateSeedDisplay(); rebuildSketch(); }

function resetParameters() {
    params = {...defaultParams};
    ['maxDepth','spread','noiseMag','mergePct','glowIntensity'].forEach(k => {
        document.getElementById(k).value = params[k];
        document.getElementById(k + '-value').textContent =
            Number.isInteger(params[k]) ? params[k] : params[k].toFixed(2);
    });
    ['bgColor','coolColor','warmColor','glowColor'].forEach(k => {
        document.getElementById(k).value = params[k];
        document.getElementById(k + '-value').textContent = params[k];
    });
    updateSeedDisplay();
    rebuildSketch();
}

function downloadPNG() {
    if (!p5Instance) return;
    p5Instance.saveCanvas('ideate-brand-' + currentMode + '-seed' + params.seed, 'png');
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────

window.addEventListener('load', function() {
    updateSeedDisplay();
    rebuildSketch();
});
</script>
</body>
