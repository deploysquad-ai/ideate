<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <!-- Background -->
  <rect width="480" height="200" fill="#1a1d2e"/>

  <!-- Root node glow -->
  <circle cx="108" cy="130" r="22" fill="#f5a623" opacity="0.18"/>
  <circle cx="108" cy="130" r="14" fill="#f5a623" opacity="0.22"/>
  <circle cx="108" cy="130" r="7" fill="#f5a623" opacity="0.9"/>

  <!-- Branch lines -->
  <!-- Left branch (cool) -->
  <line x1="108" y1="130" x2="60" y2="65" stroke="#6a7cc5" stroke-width="2" opacity="0.85"/>
  <!-- Center-left branch (warm) -->
  <line x1="108" y1="130" x2="115" y2="52" stroke="#d97757" stroke-width="2.5" opacity="0.9"/>
  <!-- Right branch (warm) -->
  <line x1="108" y1="130" x2="165" y2="70" stroke="#d97757" stroke-width="2" opacity="0.8"/>

  <!-- Sub-branch from left -->
  <line x1="60" y1="65" x2="32" y2="32" stroke="#6a7cc5" stroke-width="1.4" opacity="0.7"/>
  <!-- Sub-branch from left (merge conclusion) -->
  <line x1="60" y1="65" x2="82" y2="28" stroke="#f5a623" stroke-width="1.4" opacity="0.9"/>
  <!-- Sub-branch from right -->
  <line x1="165" y1="70" x2="188" y2="38" stroke="#f5a623" stroke-width="1.4" opacity="0.9"/>
  <line x1="165" y1="70" x2="205" y2="72" stroke="#d97757" stroke-width="1.4" opacity="0.7"/>

  <!-- Left sub-branch nodes -->
  <circle cx="32" cy="32" r="4" fill="#6a7cc5" opacity="0.8"/>
  <!-- Conclusion glow (merged) -->
  <circle cx="82" cy="28" r="10" fill="#f5a623" opacity="0.15"/>
  <circle cx="82" cy="28" r="5" fill="#f5a623" opacity="0.9"/>

  <!-- Right sub-branch nodes -->
  <circle cx="188" cy="38" r="10" fill="#f5a623" opacity="0.15"/>
  <circle cx="188" cy="38" r="5" fill="#f5a623" opacity="0.9"/>
  <circle cx="205" cy="72" r="4" fill="#d97757" opacity="0.7"/>

  <!-- Branch endpoint nodes -->
  <circle cx="60" cy="65" r="5" fill="#6a7cc5" opacity="0.85"/>
  <circle cx="115" cy="52" r="10" fill="#f5a623" opacity="0.15"/>
  <circle cx="115" cy="52" r="5.5" fill="#f5a623" opacity="0.95"/>
  <circle cx="165" cy="70" r="5" fill="#d97757" opacity="0.8"/>

  <!-- Wordmark -->
  <text x="240" y="118" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="56" font-weight="300" letter-spacing="-1" fill="rgba(255,255,255,0.92)">idea</text>
  <text x="360" y="118" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="56" font-weight="300" letter-spacing="-1" fill="#f5a623">te</text>

  <!-- Tagline -->
  <text x="240" y="142" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.38)" letter-spacing="0.2">Ramble freely. Ship a structured brief.</text>
</svg>
