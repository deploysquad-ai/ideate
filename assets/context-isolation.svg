<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Fade mask for abandoned content -->
    <linearGradient id="fade-out" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" rx="12" fill="#1a1d2e"/>

  <!-- ═══════════════ PANEL 1: Branch (context scoped) ═══════════════ -->

  <!-- Section label -->
  <text x="200" y="40" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="1">BRANCH</text>

  <!-- Main thread (dimmed while branched) -->
  <line x1="60" y1="160" x2="340" y2="160" stroke="rgba(255,255,255,0.18)" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="60" y="180" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" fill="rgba(255,255,255,0.5)">main (paused)</text>

  <!-- Root node on main -->
  <circle cx="100" cy="160" r="6" fill="#f5a623" opacity="0.3"/>

  <!-- Fork point -->
  <circle cx="160" cy="160" r="5" fill="rgba(255,255,255,0.5)"/>

  <!-- Branch rises up -->
  <path d="M 160,160 C 175,160 185,120 200,100" fill="none" stroke="#6a7cc5" stroke-width="2" opacity="0.8"/>

  <!-- Scoped context boundary -->
  <rect x="185" y="60" width="170" height="70" rx="8" fill="none" stroke="#6a7cc5" stroke-width="1" opacity="0.45" stroke-dasharray="4,3"/>
  <text x="360" y="74" font-family="'SF Mono', 'Fira Code', monospace" font-size="8" fill="#6a7cc5" opacity="0.8" text-anchor="end">scoped context</text>

  <!-- Commits inside the boundary -->
  <circle cx="220" cy="100" r="5" fill="#6a7cc5" opacity="0.9"/>
  <text x="220" y="88" font-family="'Inter', sans-serif" font-size="8" fill="rgba(255,255,255,0.75)" text-anchor="middle">explore A</text>

  <circle cx="270" cy="100" r="5" fill="#6a7cc5" opacity="0.9"/>
  <text x="270" y="88" font-family="'Inter', sans-serif" font-size="8" fill="rgba(255,255,255,0.75)" text-anchor="middle">explore B</text>

  <!-- Conclusion node -->
  <circle cx="330" cy="100" r="10" fill="#f5a623" opacity="0.12"/>
  <circle cx="330" cy="100" r="5" fill="#f5a623" opacity="0.9" filter="url(#glow)"/>
  <text x="330" y="88" font-family="'Inter', sans-serif" font-size="8" fill="#f5a623" text-anchor="middle" opacity="0.8">conclusion</text>

  <!-- Branch line through commits -->
  <line x1="200" y1="100" x2="330" y2="100" stroke="#6a7cc5" stroke-width="1.5" opacity="0.4"/>

  <!-- ═══════════════ DIVIDER ═══════════════ -->
  <line x1="400" y1="55" x2="400" y2="280" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- ═══════════════ PANEL 2: After merge ═══════════════ -->

  <!-- Section label -->
  <text x="600" y="40" font-family="'SF Mono', 'Fira Code', monospace" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle" letter-spacing="1">MERGE</text>

  <!-- Main thread (active again) -->
  <line x1="440" y1="160" x2="740" y2="160" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="440" y="180" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" fill="rgba(255,255,255,0.65)">main</text>

  <!-- Previous node on main -->
  <circle cx="480" cy="160" r="6" fill="#f5a623" opacity="0.3"/>

  <!-- Ghost of branch (faded) -->
  <path d="M 520,160 C 535,160 545,120 560,100" fill="none" stroke="#6a7cc5" stroke-width="1.5" opacity="0.15"/>
  <line x1="560" y1="100" x2="660" y2="100" stroke="#6a7cc5" stroke-width="1" opacity="0.1"/>
  <circle cx="580" cy="100" r="3" fill="#6a7cc5" opacity="0.25"/>
  <circle cx="620" cy="100" r="3" fill="#6a7cc5" opacity="0.25"/>

  <!-- Only conclusion merges back (bright) -->
  <circle cx="660" cy="100" r="8" fill="#f5a623" opacity="0.1"/>
  <circle cx="660" cy="100" r="4" fill="#f5a623" opacity="0.6"/>
  <path d="M 660,100 C 670,130 675,145 680,160" fill="none" stroke="#f5a623" stroke-width="2" opacity="0.7"/>

  <!-- Merge point on main -->
  <circle cx="680" cy="160" r="12" fill="#f5a623" opacity="0.12"/>
  <circle cx="680" cy="160" r="6" fill="#f5a623" opacity="0.85" filter="url(#glow)"/>

  <!-- Artifact badge -->
  <rect x="648" y="195" width="64" height="18" rx="4" fill="#f5a623" opacity="0.12"/>
  <text x="680" y="207" font-family="'Inter', sans-serif" font-size="9" fill="#f5a623" text-anchor="middle" opacity="0.9">Decision</text>

  <!-- ═══════════════ BOTTOM ANNOTATION ═══════════════ -->

  <!-- Left annotation -->
  <text x="200" y="250" font-family="'Inter', sans-serif" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle">Exploration stays on the branch.</text>
  <text x="200" y="268" font-family="'Inter', sans-serif" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle">Main thread is untouched.</text>

  <!-- Right annotation -->
  <text x="600" y="250" font-family="'Inter', sans-serif" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle">Only the conclusion merges back.</text>
  <text x="600" y="268" font-family="'Inter', sans-serif" font-size="11" fill="rgba(255,255,255,0.8)" text-anchor="middle">Noise stays behind.</text>
</svg>